<div class="section" id="apply">
    <h2>Apply for Service</h2>

    <form id="serviceForm" style="max-width:500px; margin:auto;">
        
        <input type="text" id="name" placeholder="Full Name" required class="input"><br><br>

        <input type="tel" id="mobile" placeholder="Mobile Number" required class="input"><br><br>

        <select id="service" class="input" required>
            <option value="">Select Service</option>
            <option>PAN Card (New / Correction)</option>
            <option>Voter ID (New / Correction)</option>
            <option>Passport Application</option>
            <option>Ayushman Bharat Card</option>
            <option>E-Shram Card</option>
            <option>Caste Certificate</option>
            <option>Income Certificate</option>
            <option>Udyam Registration (MSME)</option>
            <option>Online Forms & Govt Schemes</option>
            <option>Print / Scan / Lamination</option>
            <option>E-Filing / TDS</option>
        </select><br><br>

        <textarea id="desc" placeholder="Description / Details" class="input"></textarea><br><br>

        <button type="submit" class="btn">Submit Application</button>
    </form>

    <div id="msg" style="text-align:center; margin-top:20px;"></div>
</div>

<style>
.input {
    width:100%;
    padding:12px;
    border-radius:6px;
    border:1px solid #ccc;
}
</style>
<script>
document.getElementById("serviceForm").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let mobile = document.getElementById("mobile").value;
    let service = document.getElementById("service").value;
    let desc = document.getElementById("desc").value;

    let message = `New Customer:
Name: ${name}
Mobile: ${mobile}
Service: ${service}
Details: ${desc}`;

    // ⚠️ This calls backend (you need Node.js server below)
    fetch("http://localhost:3000/send-sms", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("msg").innerHTML = "✅ Application Submitted Successfully!";
        document.getElementById("serviceForm").reset();
    })
    .catch(err => {
        document.getElementById("msg").innerHTML = "❌ Error sending request";
    });
});
</script>
